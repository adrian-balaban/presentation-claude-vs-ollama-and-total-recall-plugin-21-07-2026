<h1 id="claude-vs-ollama--total-recall-plugin">Claude vs Ollama &amp; Total Recall Plugin</h1>
<p><strong>Autor:</strong> Adrian Balaban<br />
<strong>Data:</strong> 21 iulie 2026</p>
<p>Două subiecte practice despre cum alegem / extindem uneltele AI:</p>
<ul>
<li>primul despre decizia „model cloud proprietar&quot; (Claude Code) sau &quot;model cloud cat si local de tip proprietar sau open&quot;</li>
<li>al doilea despre persistența memoriei în Claude/Copilot/Gemini printr-un plugin MCP</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="2" lang="en-US">
<h2 id="slide-0--ce-iei-din-aceast%C4%83-sesiune">Slide 0 — Ce iei din această sesiune</h2>
<blockquote>
<p>Informatii pe care le poți folosi astazi</p>
</blockquote>
<p>Cinci lucruri pe care le iei de aici:</p>
<ol>
<li><strong>Ce este Ollama</strong> — LLM-uri locale ( zero cost-per-token, zero date în cloud) si remote</li>
<li><strong>Claude vs Ollama</strong> — comparație directă</li>
<li><strong>Integrarea Ollama cu Claude/Copilot/Gemini</strong> — ce ofera</li>
<li><strong>La ce nevoi raspunde si cum funcționează total-recall</strong> — MCP, vault-uri, hook-uri, căutare hibridă cu curbă de uitare.</li>
<li><strong>Cum îl instalezi</strong> — Claude Code, Copilot CLI, Gemini CLI.</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" lang="en-US">
<h2 id="slide-1--agend%C4%83-65-de-minute">Slide 1 — Agendă (~65 de minute)</h2>
<ol>
<li><strong>Claude vs Ollama</strong> (25 min)</li>
<li><strong>Total Recall Plugin</strong> (25 min)</li>
<li><strong>Sinteză &amp; Întrebări (Q&amp;A)</strong> (10 min)</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" lang="en-US">
<h2 id="tema-1--claude-vs-ollama">TEMA 1 — CLAUDE vs OLLAMA</h2>
<blockquote>
<p><strong>Firul roșu:</strong> AI-ul a devenit scump și cu 'lock-in'; Ollama este unul dintre proiectele ce construiește o alternativa 'open'.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" lang="en-US">
<h2 id="slide-2--ce-este-ollama">Slide 2 — Ce este Ollama?</h2>
<blockquote>
<p>Ollama este un tool open-source care îți permite să rulezi modele LLM mari <strong>local</strong>,<br />
pe propriul hardware, fără nicio conexiune la internet și fără cost per token.</p>
<p>Pentru modelele <strong>proprietare</strong> (Gemini, GPT-oss mari) sau prea mari ca să încapă pe hardware-ul tău, Ollama nu rulează local — face <strong>proxy</strong> către infrastructura sa cloud, prin aceleași comenzi CLI/API (<code>ollama run &lt;model&gt;:cloud</code>).</p>
</blockquote>
<blockquote>
<p><img class="emoji" draggable="false" alt="💡" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.3/assets/svg/1f4a1.svg" data-marp-twemoji=""/> <strong>WOW:</strong> peste <strong>100 de milioane de descărcări</strong> pe <a href="https://hub.docker.com/r/ollama/ollama">Docker Hub</a> (imaginea <code>ollama/ollama</code>) și <strong>176k stars</strong> pe <a href="https://github.com/ollama/ollama">GitHub</a> <em>(verificat iul 2026)</em>. Este cel mai popular runtime local pentru LLM-uri (dar nu singurul — v. Slide 7 pentru llama.cpp și llamafile).</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" lang="en-US">
<h2 id="slide-2--ce-este-ollama-continuare">Slide 2 — Ce este Ollama? (continuare)</h2>
<p><strong>Ce face Ollama:</strong></p>
<ul>
<li>Descarcă și rulează modele in local (Llama, Mistral, Gemma, Phi, Qwen, etc.)</li>
<li>Modelele <code>:cloud</code> (ex. <code>glm-5.2:cloud</code>, <code>gemini-3-flash-preview:cloud</code>) — inferența rulează la furnizor, nu pe hardware-ul tău</li>
<li>Expune API REST pe <code>http://localhost:11434</code>, compatibilă atât cu formatul <strong>OpenAI</strong>, cât și cu formatul <strong>Anthropic</strong> (<code>/v1/messages</code> — de asta merge <code>ollama launch claude</code>)</li>
</ul>
<p><strong>Site:</strong> <a href="https://ollama.com">ollama.com</a> · <strong>Repo:</strong> <a href="https://github.com/ollama/ollama">github.com/ollama/ollama</a> (176k stars)</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" lang="en-US">
<h2 id="slide-2--ce-este-ollama-continuare-1">Slide 2 — Ce este Ollama? (continuare)</h2>
<p><strong>Instalare — o singură comandă după download</strong> (ollama.com/download):</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">ollama run llama3.2          <span class="hljs-comment"># pull + run, gata de conversație</span>

<span class="hljs-comment"># Modele proprietare/mari — NU se descarcă; rulează prin proxy :cloud (cont ollama.com)</span>
ollama signin
ollama run gemini-3-flash-preview:cloud   <span class="hljs-comment"># Gemini, servit prin Ollama Cloud</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" lang="en-US">
<h2 id="slide-2--ce-este-ollama-continuare-2">Slide 2 — Ce este Ollama? (continuare)</h2>
<blockquote>
<p><strong><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.3/assets/svg/26a0.svg" data-marp-twemoji=""/> Unde sunt Claude, Gemini și GPT?</strong> Local rulează doar modele <strong>open-weight</strong>. Gemini frontier există doar ca <code>gemini-3-flash-preview:cloud</code>; GPT doar ca <code>gpt-oss</code> open-weight (varianta cloud: <code>gpt-oss:120b-cloud</code>); <strong>Claude nu există în Ollama deloc</strong> — doar imitații comunitare, de evitat. Pentru Claude real: API-ul Anthropic sau <code>ollama launch claude</code> cu alt model în spate.</p>
</blockquote>
<p><img class="emoji" draggable="false" alt="📄" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.3/assets/svg/1f4c4.svg" data-marp-twemoji=""/> <strong>Detalii</strong> (tabelul modelelor locale cu VRAM, lista <code>:cloud</code> completă, confuzia Gemini ≠ Gemma, Antigravity IDE, screenshot-uri): <a href="details/ollama-modele-locale-si-cloud.md">details/ollama-modele-locale-si-cloud.md</a></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" lang="en-US">
<h2 id="slide-3--cum-func%C8%9Bioneaz%C4%83-ollama-intern">Slide 3 — Cum funcționează Ollama intern</h2>
<blockquote>
<p><img class="emoji" draggable="false" alt="💡" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.3/assets/svg/1f4a1.svg" data-marp-twemoji=""/> <strong>WOW:</strong> quantizarea Q4 comprimă un model de 8× — un 70B care „cere&quot; 280 GB încape în 48 GB VRAM (GPU), cu doar ~2–5% pierdere de calitate.</p>
</blockquote>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>Cerere utilizator
       │
       ▼
┌─────────────────────────────────────────────────────────────┐
│                    Ollama daemon (local)                     │
│                                                             │
│   ┌─────────────┐     ┌──────────────┐    ┌─────────────┐  │
│   │  API REST   │────►│  Model mgr   │───►│  llama.cpp  │  │
│   │ :11434      │     │  (GGUF/Q4)   │    │  inference  │  │
│   └─────────────┘     └──────────────┘    └──────┬──────┘  │
│                                                   │         │
│                                          GPU (CUDA/Metal)   │
│                                          sau CPU fallback   │
└───────────────────────────────────────────────────┼─────────┘
                                                    │
                                               Răspuns tokenizat
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" lang="en-US">
<h2 id="slide-4--modele-instalate-local-cazul-real-ollama-list">Slide 4 — Modele instalate local: cazul real (<code>ollama list</code>)</h2>
<blockquote>
<p><img class="emoji" draggable="false" alt="🎬" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.3/assets/svg/1f3ac.svg" data-marp-twemoji=""/> <strong>Beat live:</strong> rulează <code>ollama list</code> pe ecran (10 secunde de energie reală — coloana SIZE face punctul singură); output-ul de mai jos e fallback-ul dacă demo-ul eșuează. Mașina: <strong>Dell Latitude 5521</strong> (i7-11850H, MX450 2GB GDDR6).</p>
</blockquote>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>$ ollama list
NAME                          SIZE      MODIFIED
nemotron-3-nano:30b           24 GB     8 days ago
mistral-medium-3.5:latest     80 GB     8 days ago
qwen3.6:latest                23 GB     8 days ago
qwen3.5:latest                6.6 GB    8 days ago
gemma4:latest                 9.6 GB    8 days ago
kimi-k2.7-code:cloud          —         8 days ago
ornith:9b                     5.6 GB    8 days ago
glm-5.2:cloud                 —         10 days ago
north-mini-code-1.0:latest    18 GB     12 days ago
</code></pre>
<p><strong>Concluzia practică:</strong></p>
<ul>
<li>MX450 (2GB VRAM) nu poate ține niciun model în VRAM — toate rulează pe CPU via RAM</li>
<li><code>qwen3.5</code> (6.6 GB) și <code>ornith:9b</code> (5.6 GB) sunt singurele care intră confortabil în 16 GB RAM → ~3–8 tok/s</li>
<li>Modelele cu tag <code>:cloud</code> (kimi-k2.7-code, glm-5.2) sunt <strong>API-uri externe proxiate prin Ollama</strong> — nu rulează local</li>
<li><strong>Pe acest laptop, Claude API rămâne alegerea corectă.</strong> Modelele locale = experimente offline sau eGPU extern (Thunderbolt 4)</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" lang="en-US">
<h2 id="slide-5--pot-ad%C4%83uga-gpu-pe-laptop-bonus">Slide 5 — Pot adăuga GPU pe laptop? (Bonus)</h2>
<blockquote>
<p><strong>TL;DR:</strong> Teoretic: GPU-ul intern e soldat — singura opțiune e <strong>eGPU extern via Thunderbolt 4</strong>. Cu un enclosure + RTX 3060 12GB nou (minim ~3.500 lei), rulezi modele de 7–13B complet pe GPU la 20–50 tok/s. Bottleneck-ul TB4 e irelevant pentru inference LLM (contează VRAM-ul, nu banda).</p>
</blockquote>
<p><img src="images/razer-core-x-v2-egpu-olx.png" alt="Razer Core X V2 — enclosure eGPU second-hand pe OLX" /></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" lang="en-US">
<h2 id="slide-6--la-ce-e-util-ollama-cu-glm-52-%C8%99i-kimi-k27-code">Slide 6 — La ce e util Ollama cu GLM-5.2 și Kimi-K2.7-Code?</h2>
<blockquote>
<p>Ambele apar în <code>ollama list</code> cu <code>SIZE=—</code> și suffix <code>:cloud</code> — <strong>nu sunt modele locale</strong>.<br />
Sunt API-uri externe proxiate prin Ollama; inferența rulează pe serverele Zhipu AI / Moonshot AI din China.</p>
</blockquote>
<h3 id="ce-%C3%AEnseamn%C4%83-cloud-%C3%AEn-ollama">Ce înseamnă <code>:cloud</code> în Ollama?</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>kimi-k2.7-code:cloud    —     ← niciun fișier GGUF descarcat
glm-5.2:cloud           —     ← niciun fișier GGUF descarcat
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" lang="en-US">
<h2 id="slide-6--la-ce-e-util-ollama-cu-glm-52-%C8%99i-kimi-k27-code-continuare">Slide 6 — La ce e util Ollama cu GLM-5.2 și Kimi-K2.7-Code? (continuare)</h2>
<ul>
<li><code>SIZE=—</code> = nu există model local; Ollama trimite cererea la API-ul extern</li>
<li>Tokenizarea și inferența se fac <strong>pe serverele furnizorului</strong>, nu pe CPU/GPU-ul tău</li>
<li>Avantaj față de API-ul direct: aceeași interfață CLI (<code>ollama run &lt;model&gt;:cloud</code>) pentru toate modelele <code>:cloud</code>, cu endpoint-uri atât <strong>OpenAI-compatible</strong>, cât și <strong>Anthropic-compatible</strong> — verificat: pagina fiecărui model listează direct comenzile <code>ollama launch claude/codex/opencode/copilot --model &lt;model&gt;:cloud</code></li>
<li>Claude oficial NU există în Ollama (doar prin API Anthropic: <a href="https://docs.anthropic.com">docs.anthropic.com</a>); Gemini există doar ca <a href="https://ollama.com/library/gemini-3-flash-preview">gemini-3-flash-preview:cloud</a>, iar experiența completă Gemini o dă <a href="https://antigravity.google/">Antigravity IDE</a></li>
</ul>

<h3 id="ce-sunt-cele-dou%C4%83-modele">Ce sunt cele două modele</h3>
<ul>
<li><strong>GLM-5.2</strong> (Zhipu AI, Beijing) — flagship-ul Z.ai; context ~1M tokens (976K), 756B parametri. Aproape de Claude Opus 4.8 pe Terminal-Bench 2.1 (<strong>81.0 vs 85.0</strong> — re-verificat pe ollama.com/library/glm-5.2 la 11 iul 2026), la preț API de <strong>~12–20× mai mic</strong>, greutăți deschise MIT. Română slabă — rămâi pe Claude pentru RO.</li>
<li><strong>Kimi-K2.7-Code</strong> (Moonshot AI, Beijing) — specializat pe generare și analiză de cod; puncte forte: code review, explicare cod legacy.</li>
</ul>
</section>

<h2 id="slide-6--la-ce-e-util-ollama-cu-glm-52-%C8%99i-kimi-k27-code-continuare-1">Slide 6 — La ce e util Ollama cu GLM-5.2 și Kimi-K2.7-Code? (continuare)</h2>
<h3 id="%E2%9A%A0%EF%B8%8F-regula-gdpr-partea-cu-adev%C4%83rat-util%C4%83"><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.3/assets/svg/26a0.svg" data-marp-twemoji=""/> Regula GDPR (partea cu adevărat utilă)</h3>
<ul>
<li>Ambele procesează datele pe <strong>servere în China</strong> — jurisdicție fără decizie de adecvare GDPR (spre deosebire de US, acoperit de <strong>EU-US Data Privacy Framework</strong>, decizie de adecvare din 10 iulie 2023)</li>
<li>Nici Claude nu e „gratuit&quot; GDPR: Anthropic are DPA+SCC, dar procesarea via API direct e pe infrastructură non-EU; pentru rezidență EU calea uzuală e AWS Bedrock / Vertex AI pe regiuni EU (verificați DPA-ul și subprocesatorii pentru cazul vostru concret)</li>
<li><strong>Nu trimite prin API-urile chinezești:</strong> cod cu date personale ale clienților, IP proprietar, credențiale, contracte</li>
</ul>
<p><strong>Regula scurtă:</strong> cod ne-sensibil + buget → <code>:cloud</code> chinezesc; română, date sensibile, raționament critic → Claude.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">ollama signin                          <span class="hljs-comment"># cont pe ollama.com</span>
ollama launch claude --model glm-5.2:cloud  <span class="hljs-comment"># în Claude Code</span>
</code></pre>

<h3 id="a-treia-op%C8%9Biune-llamafile--%E2%80%9Emodelul-e-un-fi%C8%99ier">A treia opțiune: llamafile — „modelul E un fișier&quot;</h3>
<blockquote>
<p><img class="emoji" draggable="false" alt="💡" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.3/assets/svg/1f4a1.svg" data-marp-twemoji=""/> <strong>WOW:</strong> un llamafile e <strong>un singur executabil</strong> care rulează pe Windows, macOS, Linux și BSD <strong>fără instalare</strong> — modelul, llama.cpp și runtime-ul într-un fișier pe care îl poți pune pe stick USB, arhiva sau șterge cu un simplu delete. (mozilla-ai/llamafile, 25k+ <img class="emoji" draggable="false" alt="⭐" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.3/assets/svg/2b50.svg" data-marp-twemoji=""/>, revitalizat de Mozilla.ai)</p>
</blockquote>
<p><strong>Trade-off-uri oneste</strong> (recunoscute chiar de Mozilla.ai): binarele sunt mari (runtime-ul se livrează cu fiecare model), swap-ul de modele e mai greoi decât <code>ollama pull</code>, iar pe Apple Silicon stack-urile MLX sunt mai rapide. llamafile e pentru cazul în care AI-ul trebuie să fie <strong>portabil, vendor-free și cu adevărat al tău</strong>.</p>
</section>

<li>Util în: finance, healthcare, proiecte cu NDA strict, codebases proprietare</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" lang="en-US">
<h2 id="slide-11--ollama-cu-claude-code-integrarea-practic%C4%83">Slide 11 — Ollama cu Claude Code: integrarea practică</h2>
<blockquote>
<p><img class="emoji" draggable="false" alt="💡" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.3/assets/svg/1f4a1.svg" data-marp-twemoji=""/> <strong>WOW — gotcha-ul „subscription hijack&quot;:</strong> configurezi manual Claude Code pe Ollama, totul pare OK… dar cu abonament Claude Max/Pro cererile pleacă <strong>silențios pe OAuth la api.anthropic.com</strong>, nu la Ollama. Cauza: <code>ANTHROPIC_API_KEY=&quot;&quot;</code> — șirul gol înseamnă „nu e setat&quot;. Fix-ul pe o linie: setează doar <code>ANTHROPIC_AUTH_TOKEN=ollama</code> și verifică cu <code>/status</code> că base URL-ul e <code>localhost:11434</code>.</p>
</blockquote>
<p><strong>Metoda oficială: <code>ollama launch claude</code></strong> — pornește clientul Claude Code cu Ollama ca backend, nativ (fără proxy):</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Model local (pe GPU propriu, ex. RTX 3060)</span>
ollama launch claude --model qwen3.5

<span class="hljs-comment"># Model cloud (fără download local)</span>
ollama launch claude --model glm-5.2:cloud

<span class="hljs-comment"># Non-interactiv / scriptat</span>
ollama launch claude --model glm-5.2:cloud --<span class="hljs-built_in">yes</span> -- -p <span class="hljs-string">&quot;how does this repo work?&quot;</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" lang="en-US">
<h2 id="slide-11--ollama-cu-claude-code-continuare">Slide 11 — Ollama cu Claude Code (continuare)</h2>
<p>Ce face comanda automat:</p>
<ul>
<li>instalează/pornește <strong>clientul Claude Code</strong></li>
<li>setează <code>ANTHROPIC_BASE_URL=http://localhost:11434</code>, <code>ANTHROPIC_AUTH_TOKEN=ollama</code>, <code>ANTHROPIC_API_KEY=&quot;&quot;</code></li>
<li>Ollama expune <strong>endpoint compatibil API Anthropic</strong> la <code>localhost:11434</code> → cerere în format Anthropic → model Ollama răspunde → răspuns re-ambalat în format Anthropic</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" lang="en-US">
<h2 id="slide-11--ollama-cu-claude-code-continuare-1">Slide 11 — Ollama cu Claude Code (continuare)</h2>
<h3 id="distinc%C8%9Bia-cheie-formatul-e-anthropic-inteligen%C8%9Ba-e-ollama">Distincția cheie: formatul e Anthropic, inteligența e Ollama</h3>
<p>Ollama vorbește <strong>nativ</strong> formatul API Anthropic la <code>localhost:11434</code> — <strong>nu există proxy separat</strong>. Clientul Claude Code „crede&quot; că vorbește cu Anthropic; de fapt răspunde modelul ales cu <code>--model</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>cerere în format Anthropic → Ollama traduce intern → modelul Ollama răspunde
      → răspuns re-ambalat în format Anthropic → clientul Claude Code îl consumă
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" lang="en-US">
<h2 id="slide-11--ollama-cu-claude-code-continuare-2">Slide 11 — Ollama cu Claude Code (continuare)</h2>
<p><strong>Metoda manuală (alternativă, fără <code>launch</code>):</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">ollama pull qwen3.5
<span class="hljs-built_in">export</span> ANTHROPIC_BASE_URL=http://localhost:11434
<span class="hljs-built_in">export</span> ANTHROPIC_AUTH_TOKEN=ollama
claude --model qwen3.5
</code></pre>
<p>Sau permanent în <code>~/.claude/settings.json</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-json"><span class="hljs-punctuation">{</span>
  <span class="hljs-attr">&quot;env&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-punctuation">{</span>
    <span class="hljs-attr">&quot;ANTHROPIC_BASE_URL&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;http://localhost:11434&quot;</span><span class="hljs-punctuation">,</span>
    <span class="hljs-attr">&quot;ANTHROPIC_AUTH_TOKEN&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;ollama&quot;</span>
  <span class="hljs-punctuation">}</span>
<span class="hljs-punctuation">}</span>
</code></pre>
<p><strong>Esențialul limitărilor:</strong> endpoint-ul Anthropic-compatibil suportă tool calling și extended thinking (suport basic — <code>budget_tokens</code> acceptat dar <strong>neaplicat</strong>), dar <strong>nu</strong> prompt caching; calitatea = calitatea modelului local ales.</p>
<p><img class="emoji" draggable="false" alt="📄" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.3/assets/svg/1f4c4.svg" data-marp-twemoji=""/> <strong>Detalii</strong> (mecanica <code>x-api-key</code> vs <code>Bearer</code>, lista completă de capabilități și limitări, modele cu tool calling): <a href="details/integrare-claude-code-ollama.md">details/integrare-claude-code-ollama.md</a></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" lang="en-US">
<h2 id="slide-11b--a-treia-cale-otari-gateway-anthropic-compatibil-bonus">Slide 11b — A treia cale: Otari, gateway Anthropic-compatibil (Bonus)</h2>
<blockquote>
<p><img class="emoji" draggable="false" alt="💡" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.3/assets/svg/1f4a1.svg" data-marp-twemoji=""/> <strong>WOW:</strong> același truc <code>ANTHROPIC_BASE_URL</code>, dar cu <strong>buget enforcement ÎNAINTE de request, nu după factură.</strong></p>
</blockquote>
<p><strong>Otari</strong> (Mozilla.ai, open-source, lansat mai 2026, construit peste <code>any-llm</code>) e un gateway LLM self-hosted care expune și endpoint-ul Anthropic (<code>POST /v1/messages</code>) — deci Claude Code poate rula prin el exact ca prin Ollama, dar cu stratul operațional pe care Ollama nu-l are:</p>
<ul>
<li><strong>Bugete</strong> per user / per cheie, aplicate <em>înainte</em> ca cererea să ruleze</li>
<li><strong>Chei virtuale</strong> — clientul nu vede niciodată cheia reală Anthropic/OpenAI; le poți revoca oricând</li>
<li><strong>Usage &amp; spend tracking</strong> în timp real, pe toate modelele (40+ provideri prin any-llm)</li>
<li>Rulezi Claude real, GPT, Mistral sau modele locale prin <strong>același endpoint</strong></li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">docker run --<span class="hljs-built_in">rm</span> -p 8000:8000 \
  -e OTARI_MASTER_KEY=... -e ANTHROPIC_API_KEY=... \
  mzdotai/otari:latest otari serve

<span class="hljs-built_in">export</span> ANTHROPIC_BASE_URL=http://localhost:8000   <span class="hljs-comment"># root, fără /v1</span>
<span class="hljs-built_in">export</span> ANTHROPIC_AUTH_TOKEN=&lt;cheia-ta-otari&gt;      <span class="hljs-comment"># Bearer, nu x-api-key</span>
<span class="hljs-built_in">export</span> ANTHROPIC_MODEL=<span class="hljs-string">&quot;anthropic:claude-sonnet-4-6&quot;</span>
claude
</code></pre>
<p><strong>Când are sens:</strong> echipă care vrea Claude real + modele alternative + control central de buget și chei — fără să dea fiecărui developer cheia API brută.</p>
</section>

<h2 id="slide-13--agent-claude-vs-agent-langchain">Slide 13 — Agent Claude vs agent LangChain</h2>
<blockquote>
<p>Confuzia vine din faptul că „agent Claude&quot; și „agent LangChain&quot; trăiesc la <strong>niveluri diferite de stivă</strong>:<br />
unul e <em>model + harness</em>, celălalt e <em>framework model-agnostic</em>.</p>
</blockquote>
<h3 id="ideea-sticky">Ideea sticky</h3>
<blockquote>
<p><strong>Diferența e cine deține loop-ul, nu dacă pot rula local.</strong> Agent Claude = harness opinat al Anthropic (configurezi, nu scrii loop-ul); LangChain/LangGraph = tu scrii graful. Ambele pot rula pe Ollama: „Claude agent e lipit de Anthropic&quot; nu mai e adevărat (<code>ollama launch claude</code>) — limitarea reală e <strong>calitatea modelului local ales</strong>. Iar <code>total-recall</code> funcționează ca memorie persistentă <strong>pentru ambele runtime-uri</strong> — același vault, indiferent de backend.</p>
</blockquote>
<blockquote>
<p><strong>Alternativa „subțire&quot; la LangChain pentru multi-provider:</strong> <strong>any-llm</strong> (Mozilla.ai, 2.1k <img class="emoji" draggable="false" alt="⭐" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.3/assets/svg/2b50.svg" data-marp-twemoji=""/>) — un singur <code>completion()</code> peste 40+ provideri, fără taxa de abstracție LangChain. Dacă tot ce vrei e „schimb providerul dintr-un string&quot;, nu-ți trebuie un framework de agenți.</p>
</blockquote>
<p><img class="emoji" draggable="false" alt="📄" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.3/assets/svg/1f4c4.svg" data-marp-twemoji=""/> <strong>Detalii</strong> (comparația pe 7 axe, cele 3 forme de „agent Claude&quot;, tabelul pe hardware real): <a href="details/agent-claude-vs-langchain.md">details/agent-claude-vs-langchain.md</a></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="37" lang="en-US">

<h2 id="tema-2--total-recall-plugin">TEMA 2 — TOTAL RECALL PLUGIN</h2>
<blockquote>
<p><strong>Puntea între teme:</strong> ai ales runtime-ul (cloud sau local). Acum să-l faci să țină minte cine ești si ce ai facut — altfel fiecare sesiune o iei de la zero.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="39" lang="en-US">
<h2 id="slide-14--problema-claude-uit%C4%83-tot-dup%C4%83-sesiune">Slide 14 — Problema: Claude uită tot după sesiune</h2>
<blockquote>
<p>La sfârșitul fiecărei conversații, Claude pierde tot contextul acumulat.<br />
Decizii, preferințe, arhitecturi discutate — totul dispare.</p>
</blockquote>
<p><strong>Simptomele:</strong></p>
<ul>
<li>Reexplici același context la fiecare sesiune nouă</li>
<li>Preferințele tale de cod trebuie re-menționate de fiecare dată</li>
<li>Deciziile de arhitectură, info. de infra. si alte categorii de informatii nu se acumulează nicăieri</li>
</ul>
<p><strong>Consecința:</strong> Cu cât lucrezi mai mult cu un agent (Claude Code...), cu atât pierzi mai mult timp re-explicând ceea ce ai deja explicat.</p>
<blockquote>
<p><strong>Cine mai vrea aceasta:</strong> Mozilla.ai a lansat <a href="https://github.com/mozilla-ai/cq"><code>cq</code></a> (1.2k <img class="emoji" draggable="false" alt="⭐" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.3/assets/svg/2b50.svg" data-marp-twemoji=""/>) — un standard deschis pentru <em>shared agent learning</em>: agenții propun «knowledge units» (workaround-uri, API-uri nedocumentate) într-un store comun, cu review uman. <strong>Complementar, nu concurent:</strong> cq = lecții operaționale partajate între agenți; total-recall = memoria (TA si A ECHIPEI TALE) de context (decizii, preferințe, arhitectură) — fișiere <code>.md</code> + git, fără server și fără review pipeline.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="40" lang="en-US">

<h2 id="slide-15--solu%C8%9Bia-total-recall">Slide 15 — Soluția: total-recall</h2>
<blockquote>
<p>Un plugin Claude Code care dă AI-ului memorie persistentă, căutabilă, între sesiuni.</p>
</blockquote>
<blockquote>
<p><img class="emoji" draggable="false" alt="🎬" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.3/assets/svg/1f3ac.svg" data-marp-twemoji=""/> <strong>Beat live:</strong> rulează pe ecran <code>claude -p &quot;Reaminteste-ti decizia noastra despre baza de date&quot;</code> și arată apelul <code>recall_memory</code> în output. (Pentru public, comanda e și „tema de acasă&quot; din handout.)</p>
</blockquote>
<p><strong>Ce este:</strong></p>
<ul>
<li><strong>Plugin Claude Code</strong> instalat din marketplace</li>
<li><strong>MCP server</strong> cu 17 unelte (stdio, înregistrat via <code>claude mcp add</code>)</li>
<li><strong>Vault de fișiere Markdown</strong> stocat local la <code>~/.total-recall/</code></li>
<li><strong>Hook-uri automate</strong> care injectează contextul la fiecare sesiune nouă</li>
<li><strong>Skill <code>/total-recall:memory-workflow</code></strong> pentru sesiuni structurate de recall/store</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="43" lang="en-US">
<h2 id="slide-15--solu%C8%9Bia-total-recall-continuare">Slide 15 — Soluția: total-recall (continuare)</h2>
<p><strong>Ce nu este:</strong></p>
<ul>
<li>Nu trimite date în cloud (vaultul personal este complet local)</li>

<h2 id="slide-21--algoritmul-de-c%C4%83utare-tf-idf--ebbinghaus">Slide 21 — Algoritmul de căutare: TF-IDF + Ebbinghaus</h2>
<blockquote>
<p><img class="emoji" draggable="false" alt="💡" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.3/assets/svg/1f4a1.svg" data-marp-twemoji=""/> <strong>WOW:</strong> memoria AI-ului <strong>uită ca un om</strong> — <a href="https://en.wikipedia.org/wiki/Forgetting_curve">curba uitării lui Ebbinghaus</a> (1885) aplicată în cod: memoriile neimportante și neaccesate se estompează din rezultate, fiecare accesare le „reîmprospătează&quot; cu +20%.</p>
</blockquote>
<blockquote>
<p><strong>Ce e TF-IDF?</strong> Term Frequency × Inverse Document Frequency — algoritmul clasic de căutare text: un cuvânt punctează mult dacă apare <strong>des în documentul respectiv</strong> (TF) dar <strong>rar în restul colecției</strong> (IDF). „postgresql&quot; care apare de 5 ori într-o memorie și aproape nicăieri altundeva = scor mare; „proiect&quot;, care apare peste tot = scor aproape zero. <em>Inverted index</em> = harta inversă <code>cuvânt → lista documentelor care îl conțin</code>, ca indexul de la finalul unei cărți — de asta căutarea nu citește fișierele, doar indexul.</p>
</blockquote>
<h3 id="pipeline-recall_memory">Pipeline <code>recall_memory</code></h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>query (text liber)
  │
  ├─ tfidfSearch(query)
  │    ├─ tokenize(query) → tokens
  │    ├─ pentru fiecare token: lookup în invertedIndex
  │    ├─ scor = TF × IDF × title-boost(2×) × tag-boost(1.5×)
  │    └─ × computeRetentionStrength(importance, daysSince, accessCount)
  │
  ├─ [opțional: hybrid=true + dependențe instalate]
  │    ├─ embed(query) → vector query
  │    ├─ searchVector(db, qvec, 50) → rezultate vectoriale
  │    └─ Reciprocal Rank Fusion([tfidf, vector], k=60)
  │              scor(d) = Σ 1/(60 + rank(d)) pe ambele liste
  │
  └─ slice la `limit`, bump accessCount, returnează cu/fără conținut complet
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="52" lang="en-US">
<h2 id="slide-21--algoritmul-de-c%C4%83utare-tf-idf--ebbinghaus-continuare">Slide 21 — Algoritmul de căutare: TF-IDF + Ebbinghaus (continuare)</h2>
<h3 id="curba-ebbinghaus-uitarea-modelat%C4%83-matematic">Curba Ebbinghaus (uitarea modelată matematic)</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>λ     = 0.16 × (1 − importanceScore × 0.8)
decay = importanceScore × exp(−λ × daysSince)
        × (1 + accessCount × 0.2 + confirmations × 0.1 − flags × 0.1)
        — rezultat limitat (clamp) la [0, 1]
</code></pre>
<table>
<thead>
<tr>
<th>importanceScore</th>
<th>λ (viteza de uitare)</th>
<th>Comportament</th>
</tr>
</thead>
<tbody>
<tr>
<td>1.0 (critic)</td>
<td>0.032</td>
<td>Decay lent — memoria rămâne relevantă săptămâni</td>
</tr>
<tr>
<td>0.5 (normal)</td>
<td>0.096</td>
<td>Decay mediu</td>
</tr>
<tr>
<td>0.3 (scăzut)</td>
<td>0.122</td>
<td>Decay rapid — dispare din rezultate în zile</td>
</tr>
</tbody>
</table>
<p>Fiecare acces adaugă +20% forță de retenție (<code>accessCount × 0.2</code>); fiecare confirmare +10%, fiecare flag −10% (<code>confirm_memory</code>) — memoria nu doar „îmbătrânește&quot;, ci primește feedback.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="53" lang="en-US">
<h2 id="slide-22--embeddings-%C8%99i-c%C4%83utare-multilingual%C4%83-op%C8%9Bionale">Slide 22 — Embeddings și căutare multilinguală (opționale)</h2>

</blockquote>

<li><strong>Limitare (graceful degradation):</strong> Deoarece acești clienți drops/ignoră output-ul stdout al hook-urilor, <strong>injectarea automată a indexului de context (<code>additionalContext</code>) în memoria de conversație este dezactivată</strong>. Modelul nu vede rezumatul memoriilor la pornire, însă le poate interoga oricând manual prin uneltele MCP.</li>

<h2 id="slide-24--instalare-%C8%99i-utilizare-practic%C4%83">Slide 24 — Instalare și utilizare practică</h2>
<blockquote>
<p><img class="emoji" draggable="false" alt="💡" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.3/assets/svg/1f4a1.svg" data-marp-twemoji=""/> <strong>Util:</strong> același plugin, 4 clienți — Claude Code, Copilot CLI, Gemini CLI, standalone — cu un singur <code>install.sh</code>.</p>
</blockquote>
<h3 id="instalare-bazat%C4%83-pe-client">Instalare bazată pe client</h3>
<p>Scriptul <code>install.sh</code> este acum conștient de starea clientului și acceptă argumente specifice:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># 1. Clonează marketplace-ul și construiește pluginul</span>
git <span class="hljs-built_in">clone</span> https://github.com/adrian-balaban/my-claude-plugins-marketplace.git
<span class="hljs-built_in">cd</span> my-claude-plugins-marketplace/plugins/total-recall
npm install &amp;&amp; npm run build

<span class="hljs-comment"># 2. Înregistrează în funcție de clientul tău:</span>

<span class="hljs-comment"># Pentru Claude Code (nativ):</span>
claude plugin install <span class="hljs-string">&quot;<span class="hljs-subst">$(pwd)</span>&quot;</span>

<span class="hljs-comment"># Pentru GitHub Copilot CLI (MCP + hooks.copilot.json):</span>
./install.sh --copilot

<span class="hljs-comment"># Pentru Gemini CLI (MCP + hooks.gemini.json):</span>
./install.sh --gemini

<span class="hljs-comment"># Pentru instalare Standalone (scrie căi absolute în settings.json):</span>
./install.sh --standalone
</code></pre>
<blockquote>
<p><strong>Org vault = opțional, dezactivat implicit</strong> (pasul 6 din <code>install.sh</code>, default „n&quot;). Cine instalează doar pentru uz personal poate ignora complet acest pas — memoria locală (<code>personal-vault</code>) funcționează 100% de la prima rulare, fără git. Vaultul org e strict pentru cine vrea memorie partajată de echipă pe git (necesită <code>gh</code> CLI autentificat, cerut <strong>doar</strong> la acest pas).</p>
</blockquote>
</section>

<h2 id="slide-25--compatibilitate-continuare">Slide 25 — Compatibilitate (continuare)</h2>
<blockquote>
<p><strong>Bonus:</strong> vault-urile total-recall se deschid nativ în <strong>Obsidian</strong> (fișiere <code>.md</code> cu frontmatter YAML). Nu folosi Obsidian Sync pe <code>org-vault</code> — sync-ul trebuie să treacă prin git-ul total-recall.</p>
</blockquote>
<blockquote>
<p><strong>„De ce nu folosiți cq?&quot;</strong> — comparație onestă: <code>cq</code> (Mozilla.ai) acoperă <strong>7 host-uri</strong> (Claude, Codex, Copilot, Cursor, OpenCode, Pi, Windsurf), dar <strong>fără context injection</strong> — agentul trebuie să interogheze explicit store-ul. total-recall acoperă 3 clienți cu hooks automate (+ context injection nativ în Claude Code) și obiect partial similar: memorie de context, nu knowledge units partajate.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="62" lang="en-US">
<h2 id="slide-26--sinteza-final%C4%83-%C8%99i-%C3%AEntreb%C4%83ri-deschise">Slide 26 — Sinteza finală și întrebări deschise</h2>
<blockquote>
<p><img class="emoji" draggable="false" alt="💡" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.3/assets/svg/1f4a1.svg" data-marp-twemoji=""/> <strong>UTIL Takeaway — 3 lucruri de făcut mâine dimineață:</strong> (1) Instalează Ollama, (2) rulează <code>ollama launch claude --model gemma3:4b</code> pentru teste locale rapide, (3) adaugă <code>total-recall</code> pentru memorie persistentă între sesiuni. Primele 10 minute cu total-recall, pas cu pas: <a href="details/primele-10-minute.md">details/primele-10-minute.md</a> · Ghidul de decizie printabil: <a href="details/decizie-o-pagina.md">details/decizie-o-pagina.md</a></p>
</blockquote>
<h3 id="ce-am-acoperit">Ce am acoperit</h3>
<p><strong>Claude vs Ollama:</strong></p>
<ul>
<li>Claude API: calitate maximă, cost per token, date în cloud · Ollama: gratuit, 100% local, offline</li>
<li><code>ollama launch claude</code>: harness-ul Claude Code pe model local — fără proxy</li>
<li>Agent Claude vs LangChain: diferența e <strong>cine deține loop-ul</strong>, nu dacă pot rula local</li>
<li>Decizia cheie: <strong>confidențialitate &gt; calitate &gt; cost</strong></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="63" lang="en-US">
<h2 id="slide-26--sinteza-final%C4%83-%C8%99i-%C3%AEntreb%C4%83ri-deschise-continuare">Slide 26 — Sinteza finală și întrebări deschise (continuare)</h2>
<p><strong>Total Recall:</strong></p>
<ul>
<li>Plugin MCP (17 unelte) pentru memorie persistentă — Claude Code, Copilot, Gemini CLI</li>
<li>Vault dual (personal local + org pe git cu privacy filter), căutare hibridă cu Ebbinghaus decay</li>
<li>Memoria = fișiere Markdown: git-abile, Obsidian-abile, ale tale</li>
</ul>
<p><strong>Firul Mozilla.ai, recapitulat ca un kit de suveranitate:</strong> llamafile = portabilitate totală · any-llm = multi-provider fără framework · Otari = gateway cu bugete · cq = shared agent learning. Le-am întâlnit pe parcurs; împreună sunt răspunsul open-source la „AI-ul cloud s-a scumpit&quot;.</p>
</section>

<li>Ce modele Ollama ați testat pe hardware de lucru real?</li>
